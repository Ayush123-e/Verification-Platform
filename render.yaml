services:
  # Backend API — Node.js/Express
  - type: web
    name: vshield-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGO_URI
        sync: false   # Set this manually in Render dashboard (your MongoDB Atlas URI)
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
